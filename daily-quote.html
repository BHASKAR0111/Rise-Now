<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Rigel — Outgrow the Ordinary. A fully responsive career guidance & motivation platform built for job seekers, career switchers, and people starting over."/>
  <meta property="og:title" content="Rigel — Outgrow"/>
  <meta property="og:description" content="Free career paths, daily motivation, real success stories and powerful tools — all in one platform."/>
  <meta property="og:type" content="website"/>
  <title>Daily Quote | Rigel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #00C2FF;
      --blue-dim: #0090CC;
      --bg: #0d1117;
      --card: #161b22;
      --border: rgba(255,255,255,0.07);
      --text: rgba(255,255,255,0.85);
      --muted: rgba(255,255,255,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-r {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #0d1117;
    }
    .logo-name {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(90deg, var(--blue), var(--blue));
      color: var(--blue); background-clip: text;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; }
    .nav-links a:hover, .nav-links a.active { color: var(--blue); }

    /* MAIN QUOTE SECTION */
    .quote-section {
      min-height: calc(100vh - 64px - 80px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 40px;
      position: relative; overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,230,118,0.06) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .date-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2);
      color: var(--blue); font-size: 12px; font-weight: 600;
      padding: 6px 16px; border-radius: 20px;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 40px; position: relative; z-index: 1;
    }

    .quote-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 60px;
      max-width: 760px;
      width: 100%;
      position: relative; z-index: 1;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .quote-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--blue));
      border-radius: 24px 24px 0 0;
    }

    .quote-icon {
      font-size: 48px;
      margin-bottom: 28px;
      display: block;
      opacity: 0.8;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-style: italic;
      font-weight: 700;
      color: white;
      line-height: 1.5;
      margin-bottom: 24px;
      transition: opacity 0.4s;
    }

    .quote-author {
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .quote-category {
      display: inline-block;
      background: rgba(0,188,212,0.1);
      border: 1px solid rgba(0,188,212,0.2);
      color: #00bcd4;
      font-size: 11px; font-weight: 700;
      padding: 4px 14px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 36px;
    }

    .quote-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }

    .btn-new {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--blue), var(--blue));
      border: none; border-radius: 10px;
      color: #0d1117; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-new:hover { opacity: 0.9; }

    .btn-copy, .btn-share {
      padding: 12px 24px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-copy:hover, .btn-share:hover {
      border-color: rgba(0,230,118,0.3);
      color: var(--blue);
    }

    /* CATEGORY FILTER */
    .cat-filters {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-top: 40px; position: relative; z-index: 1;
    }
    .cat-btn {
      padding: 8px 18px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .cat-btn:hover { border-color: rgba(0,230,118,0.3); color: var(--blue); }
    .cat-btn.active {
      background: rgba(0,230,118,0.1);
      border-color: rgba(0,230,118,0.3);
      color: var(--blue);
    }

    /* QUOTE HISTORY */
    .history-section {
      max-width: 760px; margin: 60px auto 0;
      padding: 0 40px 60px;
    }
    .history-title {
      font-size: 14px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 20px;
    }
    .history-grid {
      display: flex; flex-direction: column; gap: 12px;
    }
    .history-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px;
      display: flex; align-items: flex-start; gap: 16px;
    }
    .history-num {
      font-size: 12px; font-weight: 700;
      color: var(--muted); min-width: 24px; margin-top: 2px;
    }
    .history-text {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-style: italic;
      color: rgba(255,255,255,0.7); line-height: 1.6; flex: 1;
    }
    .history-author {
      font-size: 12px; color: var(--blue);
      font-weight: 600; margin-top: 4px;
      font-family: 'Inter', sans-serif;
      font-style: normal;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border); padding: 32px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    footer p { font-size: 13px; color: var(--muted); }
  </style>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-r">R</div>
    <div class="logo-name">Rigel</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="resources.html">Resources</a></li>
    <li><a href="job-tracker.html">Job Tracker</a></li>
    <li><a href="daily-quote.html" class="active">Daily Quote</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<!-- QUOTE SECTION -->
<div class="quote-section">
  <div class="glow"></div>

  <div class="date-badge" id="dateBadge">✨ Today's Quote</div>

  <div class="quote-card">
    <span class="quote-icon" id="quoteIcon">💫</span>
    <div class="quote-text" id="quoteText">Loading your quote...</div>
    <div class="quote-author" id="quoteAuthor">—</div>
    <div class="quote-category" id="quoteCategory">Motivation</div>
    <div class="quote-actions">
      <button class="btn-new" onclick="newQuote()">✨ New Quote</button>
      <button class="btn-copy" onclick="copyQuote()">📋 Copy</button>
      <button class="btn-share" onclick="shareQuote()">🔗 Share</button>
    </div>
  </div>

  <!-- CATEGORY FILTERS -->
  <div class="cat-filters">
    <button class="cat-btn active" onclick="filterCat('all', this)">All</button>
    <button class="cat-btn" onclick="filterCat('motivation', this)">💪 Motivation</button>
    <button class="cat-btn" onclick="filterCat('career', this)">💼 Career</button>
    <button class="cat-btn" onclick="filterCat('resilience', this)">🔥 Resilience</button>
    <button class="cat-btn" onclick="filterCat('growth', this)">🌱 Growth</button>
  </div>
</div>

<!-- HISTORY -->
<div class="history-section">
  <div class="history-title">📖 Recently Shown</div>
  <div class="history-grid" id="historyGrid"></div>
</div>

<!-- FOOTER -->
<footer>
  <a href="index.html" class="nav-logo">
    <div class="logo-r">R</div>
    <div class="logo-name">Rigel</div>
  </a>
  <p>© 2026 Rigel. Outgrow the Ordinary.</p>
</footer>

<script>
  const quotes = [
    { text: "The comeback is always stronger than the setback.", author: "Unknown", category: "resilience", icon: "🔥" },
    { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar", category: "motivation", icon: "🚀" },
    { text: "Opportunities don't happen. You create them.", author: "Chris Grosser", category: "career", icon: "💼" },
    { text: "It always seems impossible until it's done.", author: "Nelson Mandela", category: "resilience", icon: "💪" },
    { text: "The secret of getting ahead is getting started.", author: "Mark Twain", category: "motivation", icon: "⚡" },
    { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson", category: "motivation", icon: "⏰" },
    { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt", category: "motivation", icon: "✨" },
    { text: "Your only limit is your mind.", author: "Unknown", category: "growth", icon: "🧠" },
    { text: "Fall seven times, stand up eight.", author: "Japanese Proverb", category: "resilience", icon: "🔥" },
    { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill", category: "resilience", icon: "💡" },
    { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Unknown", category: "motivation", icon: "🏆" },
    { text: "Dream it. Wish it. Do it.", author: "Unknown", category: "motivation", icon: "🌟" },
    { text: "Great things never come from comfort zones.", author: "Unknown", category: "growth", icon: "🌱" },
    { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown", category: "motivation", icon: "💪" },
    { text: "Sometimes later becomes never. Do it now.", author: "Unknown", category: "career", icon: "⚡" },
    { text: "Hard times never last, but hard people do.", author: "Robert H. Schuller", category: "resilience", icon: "🔥" },
    { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", category: "career", icon: "❤️" },
    { text: "You are braver than you believe, stronger than you seem.", author: "A.A. Milne", category: "motivation", icon: "🦁" },
    { text: "Act as if what you do makes a difference. It does.", author: "William James", category: "growth", icon: "🌍" },
    { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe", category: "career", icon: "🎯" },
    { text: "The expert in anything was once a beginner.", author: "Helen Hayes", category: "growth", icon: "🌱" },
    { text: "Don't stop when you're tired. Stop when you're done.", author: "Unknown", category: "motivation", icon: "💪" },
    { text: "Difficult roads often lead to beautiful destinations.", author: "Unknown", category: "resilience", icon: "🛤️" },
    { text: "Every day is a second chance.", author: "Unknown", category: "motivation", icon: "🌅" },
    { text: "What you get by achieving your goals is not as important as what you become.", author: "Thoreau", category: "growth", icon: "✨" },
    { text: "Rejection is redirection.", author: "Unknown", category: "career", icon: "🔄" },
    { text: "One day or day one. You decide.", author: "Unknown", category: "motivation", icon: "📅" },
    { text: "Your future is created by what you do today, not tomorrow.", author: "Robert Kiyosaki", category: "growth", icon: "🌱" },
    { text: "Keep going. Everything you need will come to you at the perfect time.", author: "Unknown", category: "resilience", icon: "⏳" },
    { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb", category: "growth", icon: "🌳" },
  ];

  let currentCategory = 'all';
  let history = [];
  let currentQuote = null;

  function getFilteredQuotes() {
    if (currentCategory === 'all') return quotes;
    return quotes.filter(q => q.category === currentCategory);
  }

  function getDailyQuote() {
    const today = new Date().toDateString();
    const seed = today.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const filtered = getFilteredQuotes();
    return filtered[seed % filtered.length];
  }

  function showQuote(q) {
    document.getElementById('quoteIcon').textContent = q.icon;
    document.getElementById('quoteText').textContent = `"${q.text}"`;
    document.getElementById('quoteAuthor').textContent = `— ${q.author}`;
    document.getElementById('quoteCategory').textContent = q.category.charAt(0).toUpperCase() + q.category.slice(1);
    currentQuote = q;

    // Add to history
    if (!history.find(h => h.text === q.text)) {
      history.unshift(q);
      if (history.length > 5) history.pop();
      renderHistory();
    }
  }

  function newQuote() {
    const filtered = getFilteredQuotes();
    const q = filtered[Math.floor(Math.random() * filtered.length)];
    showQuote(q);
  }

  function filterCat(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    newQuote();
  }

  function copyQuote() {
    if (!currentQuote) return;
    const text = `"${currentQuote.text}" — ${currentQuote.author}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy', 2000);
    });
  }

  function shareQuote() {
    if (!currentQuote) return;
    const text = `"${currentQuote.text}" — ${currentQuote.author}\n\nvia Rigel 🚀`;
    if (navigator.share) {
      navigator.share({ title: 'Daily Quote | Rigel', text });
    } else {
      copyQuote();
    }
  }

  function renderHistory() {
    const grid = document.getElementById('historyGrid');
    if (history.length <= 1) { grid.innerHTML = ''; return; }
    grid.innerHTML = history.slice(1).map((q, i) => `
      <div class="history-card">
        <div class="history-num">${i + 1}</div>
        <div>
          <div class="history-text">"${q.text}"</div>
          <div class="history-author">— ${q.author}</div>
        </div>
      </div>
    `).join('');
  }

  function setDate() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('dateBadge').textContent = `✨ ${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  }

  setDate();
  showQuote(getDailyQuote());
</script>
</body>
</html>
