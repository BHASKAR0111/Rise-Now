<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Rigel — Outgrow the Ordinary. A fully responsive career guidance & motivation platform built for job seekers, career switchers, and people starting over."/>
  <meta property="og:title" content="Rigel — Outgrow"/>
  <meta property="og:description" content="Free career paths, daily motivation, real success stories and powerful tools — all in one platform."/>
  <meta property="og:type" content="website"/>
  <title>Rigel — Live Job Listings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --blue:#00C2FF;--blue-dim:#0090CC;
      --bg:#04050F;--card:#0A0C1E;
      --border:rgba(255,255,255,0.07);
      --text:rgba(255,255,255,0.85);
      --muted:rgba(255,255,255,0.4);
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    .bg-stars{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,100,60,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,80,80,0.1) 0%,transparent 50%);}

    /* ===== NAV ===== */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      background:rgba(10,15,13,0.9);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 48px;height:68px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-box{width:40px;height:40px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#04050F;}
    .logo-text{font-size:22px;font-weight:800;background:var(--blue);color:var(--blue);}
    .nav-links{display:flex;align-items:center;gap:8px;}
    .nav-link{padding:8px 16px;font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;border-radius:8px;transition:color 0.2s;}
    .nav-link:hover{color:white;}
    .nav-link.active{color:var(--blue);}

    /* ===== PAGE HEADER ===== */
    .page-header{
      padding: 108px 48px 48px;
      position:relative;z-index:1;
      max-width:1200px;margin:0 auto;
    }
    .page-header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);color:var(--blue);font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
    .page-header h1{font-size:clamp(36px,5vw,56px);font-weight:900;letter-spacing:-2.5px;line-height:1.05;color:white;}
    .page-header h1 .grad{background:var(--blue);color:var(--blue);}
    .page-header p{font-size:15px;color:var(--muted);margin-top:10px;line-height:1.7;max-width:480px;}
    .total-badge{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 24px;text-align:right;white-space:nowrap;}
    .total-badge .num{font-size:28px;font-weight:900;background:var(--blue);color:var(--blue);}
    .total-badge .lbl{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px;}

    /* ===== SEARCH BAR ===== */
    .search-section{
      max-width:1200px;margin:0 auto;
      padding:0 48px 32px;
      position:relative;z-index:1;
    }
    .search-bar{
      display:flex;gap:10px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      flex-wrap:wrap;
    }
    .search-bar input,.search-bar select{
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      color:var(--text);
      padding:11px 16px;
      border-radius:10px;
      font-family:'Inter',sans-serif;
      font-size:14px;
      outline:none;
      transition:border-color 0.2s;
    }
    .search-bar input:focus,.search-bar select:focus{border-color:rgba(0,230,118,0.4);}
    .search-bar input{flex:1;min-width:180px;}
    .search-bar input::placeholder{color:var(--muted);}
    .search-bar select{min-width:150px;cursor:pointer;}
    .search-bar select option{background:#0A0C1E;}
    .btn-search{
      padding:11px 28px;
      background:var(--blue);
      border:none;border-radius:10px;
      color:#04050F;font-size:14px;font-weight:800;
      cursor:pointer;font-family:'Inter',sans-serif;
      transition:opacity 0.2s,transform 0.15s;
      white-space:nowrap;
    }
    .btn-search:hover{opacity:0.88;transform:translateY(-1px);}

    /* ===== FILTER CHIPS ===== */
    .filter-chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
    .chip{
      padding:6px 14px;font-size:12px;font-weight:600;
      border-radius:20px;cursor:pointer;border:1px solid var(--border);
      color:var(--muted);background:transparent;
      font-family:'Inter',sans-serif;transition:all 0.2s;
    }
    .chip:hover,.chip.active{border-color:rgba(0,230,118,0.4);color:var(--blue);background:rgba(0,230,118,0.07);}

    /* ===== MAIN LAYOUT ===== */
    .main-wrap{
      max-width:1200px;margin:0 auto;
      padding:0 48px 80px;
      position:relative;z-index:1;
    }
    .results-bar{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:20px;flex-wrap:wrap;gap:10px;
    }
    .results-count{font-size:13px;color:var(--muted);}
    .results-count span{color:var(--text);font-weight:600;}

    /* ===== JOB CARDS ===== */
    #jobs-container{display:flex;flex-direction:column;gap:12px;}

    .job-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:22px 28px;
      display:flex;align-items:center;gap:20px;
      transition:border-color 0.2s,transform 0.2s,background 0.2s;
      animation:fadeUp 0.35s ease both;
      position:relative;overflow:hidden;
    }
    .job-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--blue);
      opacity:0;transition:opacity 0.2s;
    }
    .job-card:hover{
      border-color:rgba(0,230,118,0.2);
      transform:translateY(-2px);
      background:#141f1a;
    }
    .job-card:hover::before{opacity:1;}
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(14px);}
      to{opacity:1;transform:translateY(0);}
    }

    .company-logo{
      width:50px;height:50px;border-radius:12px;
      background:linear-gradient(135deg,rgba(0,230,118,0.12),rgba(0,188,212,0.12));
      border:1px solid rgba(0,230,118,0.15);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:900;color:var(--blue);
      flex-shrink:0;text-transform:uppercase;
      font-family:'Inter',sans-serif;
    }

    .job-info{flex:1;min-width:0;}
    .job-title{
      font-size:15px;font-weight:700;color:white;
      margin-bottom:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .job-company{
      font-size:13px;font-weight:500;
      background:var(--blue);
      color:var(--blue);
      margin-bottom:10px;display:inline-block;
    }
    .job-tags{display:flex;gap:8px;flex-wrap:wrap;}
    .tag{
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      border-radius:6px;padding:4px 10px;
      font-size:11px;color:var(--muted);font-weight:500;
      display:flex;align-items:center;gap:4px;
    }
    .tag.salary{
      background:rgba(0,230,118,0.07);
      border-color:rgba(0,230,118,0.2);
      color:var(--blue);
    }

    .job-right{
      display:flex;flex-direction:column;
      align-items:flex-end;gap:10px;flex-shrink:0;
    }
    .btn-apply{
      padding:9px 22px;
      background:var(--blue);
      border:none;border-radius:9px;
      color:#04050F;font-size:13px;font-weight:800;
      cursor:pointer;font-family:'Inter',sans-serif;
      text-decoration:none;display:inline-flex;align-items:center;gap:6px;
      transition:opacity 0.2s,transform 0.15s;
      white-space:nowrap;
    }
    .btn-apply:hover{opacity:0.88;transform:translateY(-1px);}
    .job-age{font-size:11px;color:var(--muted);font-weight:500;}

    /* ===== SKELETON ===== */
    .skeleton-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:16px;padding:22px 28px;
      display:flex;gap:20px;align-items:center;
    }
    .skel{
      border-radius:8px;
      background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);
      background-size:200% 100%;
      animation:shimmer 1.6s infinite;
    }
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    /* ===== EMPTY / ERROR ===== */
    .state-msg{text-align:center;padding:80px 20px;color:var(--muted);}
    .state-msg .icon{font-size:44px;margin-bottom:18px;}
    .state-msg h3{font-size:20px;font-weight:800;color:white;margin-bottom:8px;}
    .state-msg p{font-size:14px;line-height:1.7;}

    /* ===== PAGINATION ===== */
    .pagination{
      display:flex;justify-content:center;align-items:center;
      gap:12px;margin-top:40px;flex-wrap:wrap;
    }
    .btn-page{
      padding:9px 22px;
      background:var(--card);
      border:1px solid var(--border);
      color:var(--text);border-radius:9px;
      font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
      cursor:pointer;transition:all 0.2s;
    }
    .btn-page:hover:not(:disabled){border-color:rgba(0,230,118,0.4);color:var(--blue);}
    .btn-page:disabled{opacity:0.3;cursor:not-allowed;}
    .page-nums{display:flex;gap:6px;}
    .page-num{
      width:36px;height:36px;border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:600;cursor:pointer;
      background:var(--card);border:1px solid var(--border);
      color:var(--muted);transition:all 0.2s;
    }
    .page-num.active{
      background:var(--blue);
      color:#04050F;border-color:transparent;
    }
    .page-num:hover:not(.active){border-color:rgba(0,230,118,0.3);color:var(--blue);}

    @media(max-width:768px){
      nav{padding:0 20px;}
      .page-header,.search-section,.main-wrap{padding-left:20px;padding-right:20px;}
      .page-header{padding-top:88px;}
      .job-card{flex-wrap:wrap;}
      .job-right{flex-direction:row;width:100%;justify-content:space-between;}
      .page-nums{display:none;}
    }
  </style>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg-stars"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-box">R</div>
    <div class="logo-text">Rigel</div>
  </a>
  <div class="nav-links">
    <a href="careers.html" class="nav-link">Careers</a>
    <a href="resources.html" class="nav-link">Resources</a>
    <a href="daily-quote.html" class="nav-link">Motivation</a>
    <a href="jobs.html" class="nav-link active">Jobs</a>
    <a href="#about" class="nav-link">About</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="hero-badge">
    <div class="live-dot"></div>
    Live Listings
  </div>
  <div class="page-header-inner">
    <div>
      <h1>Find Your Next<br><span class="grad">Opportunity.</span></h1>
      <p>Real-time job listings across India — powered by Adzuna. Apply directly with one click.</p>
    </div>
    <div class="total-badge">
      <div class="num" id="total-num">—</div>
      <div class="lbl">Jobs Found</div>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-section">
  <div class="search-bar">
    <input type="text" id="query" placeholder="🔍  Role, skill, keyword..." value="Data Analyst"/>
    <select id="location">
      <option value="">📍 All India</option>
      <option value="delhi">Delhi</option>
      <option value="bangalore">Bangalore</option>
      <option value="mumbai">Mumbai</option>
      <option value="hyderabad">Hyderabad</option>
      <option value="pune">Pune</option>
      <option value="chennai">Chennai</option>
    </select>
    <select id="jobtype">
      <option value="">💼 Any Type</option>
      <option value="full_time">Full-time</option>
      <option value="part_time">Part-time</option>
      <option value="contract">Contract</option>
    </select>
    <button class="btn-search" onclick="searchJobs(1)">Search →</button>
  </div>
  <div class="filter-chips" id="chips">
    <button class="chip active" onclick="quickSearch(this,'Data Analyst')">Data Analyst</button>
    <button class="chip" onclick="quickSearch(this,'Python Developer')">Python Developer</button>
    <button class="chip" onclick="quickSearch(this,'Machine Learning')">ML Engineer</button>
    <button class="chip" onclick="quickSearch(this,'Web Developer')">Web Developer</button>
    <button class="chip" onclick="quickSearch(this,'Data Science')">Data Science</button>
    <button class="chip" onclick="quickSearch(this,'Business Analyst')">Business Analyst</button>
    <button class="chip" onclick="quickSearch(this,'Software Engineer')">Software Engineer</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <div class="results-bar">
    <div class="results-count" id="results-label">Searching...</div>
  </div>
  <div id="jobs-container"></div>
  <div class="pagination" id="pagination" style="display:none">
    <button class="btn-page" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
    <div class="page-nums" id="page-nums"></div>
    <button class="btn-page" id="btn-next" onclick="changePage(1)">Next →</button>
  </div>
</div>

<script>
  const APP_ID  = '2f6465b2';
  const API_KEY = 'a1fe6998e38dde7e76ef856edf112b9e';
  const PER_PAGE = 10;
  let currentPage = 1;
  let totalResults = 0;

  function timeAgo(d) {
    if (!d) return '';
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 3600)  return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    if (s < 604800) return Math.floor(s/86400) + 'd ago';
    return Math.floor(s/604800) + 'w ago';
  }

  function fmtSalary(mn, mx) {
    if (!mn && !mx) return null;
    const f = n => n >= 100000 ? '₹'+(n/100000).toFixed(0)+'L/yr' : '₹'+(n/1000).toFixed(0)+'K/yr';
    if (mn && mx) return f(mn)+' – '+f(mx);
    if (mn) return f(mn)+'+';
    return 'Up to '+f(mx);
  }

  function showSkeletons() {
    document.getElementById('jobs-container').innerHTML = Array(6).fill(0).map(()=>`
      <div class="skeleton-card">
        <div class="skel" style="width:50px;height:50px;border-radius:12px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skel" style="height:16px;width:55%;margin-bottom:10px;border-radius:6px"></div>
          <div class="skel" style="height:12px;width:30%;margin-bottom:14px;border-radius:6px"></div>
          <div style="display:flex;gap:8px">
            <div class="skel" style="height:24px;width:90px;border-radius:6px"></div>
            <div class="skel" style="height:24px;width:90px;border-radius:6px"></div>
          </div>
        </div>
        <div class="skel" style="height:36px;width:90px;border-radius:9px;flex-shrink:0"></div>
      </div>
    `).join('');
  }

  async function searchJobs(page = 1) {
    currentPage = page;
    const q   = document.getElementById('query').value.trim() || 'jobs';
    const loc = document.getElementById('location').value;
    const jt  = document.getElementById('jobtype').value;

    showSkeletons();
    document.getElementById('pagination').style.display = 'none';
    document.getElementById('results-label').textContent = 'Searching...';

    let url = `https://api.adzuna.com/v1/api/jobs/in/search/${page}?app_id=${APP_ID}&app_key=${API_KEY}&results_per_page=${PER_PAGE}&what=${encodeURIComponent(q)}&content-type=application/json`;
    if (loc) url += `&where=${encodeURIComponent(loc)}`;
    if (jt)  url += `&full_time=${jt === 'full_time' ? 1 : 0}`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('API returned ' + res.status);
      const data = await res.json();
      totalResults = data.count || 0;
      document.getElementById('total-num').textContent = totalResults.toLocaleString();
      document.getElementById('results-label').innerHTML =
        `Showing <span>${Math.min((page-1)*PER_PAGE+1, totalResults)}–${Math.min(page*PER_PAGE, totalResults)}</span> of <span>${totalResults.toLocaleString()}</span> jobs`;
      renderJobs(data.results || []);
      setupPagination(page);
    } catch(e) {
      document.getElementById('jobs-container').innerHTML = `
        <div class="state-msg">
          <div class="icon">⚠️</div>
          <h3>Could not load jobs</h3>
          <p>${e.message}<br>Check your connection and try again.</p>
        </div>`;
      document.getElementById('results-label').textContent = 'Error loading results';
    }
  }

  function renderJobs(jobs) {
    if (!jobs.length) {
      document.getElementById('jobs-container').innerHTML = `
        <div class="state-msg">
          <div class="icon">🔍</div>
          <h3>No jobs found</h3>
          <p>Try a different keyword or remove filters.</p>
        </div>`;
      return;
    }
    document.getElementById('jobs-container').innerHTML = jobs.map((j, i) => {
      const letter = (j.company?.display_name || 'C')[0].toUpperCase();
      const salary = fmtSalary(j.salary_min, j.salary_max);
      const ctype  = j.contract_time === 'full_time' ? 'Full-time'
                   : j.contract_time === 'part_time'  ? 'Part-time'
                   : j.contract_time || 'Not specified';
      return `
      <div class="job-card" style="animation-delay:${i*0.045}s">
        <div class="company-logo">${letter}</div>
        <div class="job-info">
          <div class="job-title" title="${j.title}">${j.title}</div>
          <div class="job-company">${j.company?.display_name || 'Company'}</div>
          <div class="job-tags">
            <span class="tag">📍 ${j.location?.display_name || 'India'}</span>
            <span class="tag">💼 ${ctype}</span>
            ${salary ? `<span class="tag salary">💰 ${salary}</span>` : ''}
            ${j.category?.label ? `<span class="tag">🏷 ${j.category.label}</span>` : ''}
          </div>
        </div>
        <div class="job-right">
          <a class="btn-apply" href="${j.redirect_url}" target="_blank" rel="noopener">Apply →</a>
          <span class="job-age">${timeAgo(j.created)}</span>
        </div>
      </div>`;
    }).join('');
  }

  function setupPagination(page) {
    const totalPages = Math.min(Math.ceil(totalResults / PER_PAGE), 50);
    if (totalPages <= 1) return;
    document.getElementById('pagination').style.display = 'flex';
    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = page >= totalPages;

    // Page number pills
    const nums = document.getElementById('page-nums');
    let pages = [];
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) pages.push(i);
    } else {
      pages = [1];
      if (page > 3) pages.push('…');
      for (let i = Math.max(2, page-1); i <= Math.min(totalPages-1, page+1); i++) pages.push(i);
      if (page < totalPages-2) pages.push('…');
      pages.push(totalPages);
    }
    nums.innerHTML = pages.map(p =>
      p === '…' ? `<div class="page-num" style="cursor:default;color:var(--muted);border:none;background:transparent">…</div>`
                : `<div class="page-num${p===page?' active':''}" onclick="searchJobs(${p})">${p}</div>`
    ).join('');
  }

  function changePage(dir) {
    const totalPages = Math.min(Math.ceil(totalResults / PER_PAGE), 50);
    const next = currentPage + dir;
    if (next < 1 || next > totalPages) return;
    searchJobs(next);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function quickSearch(el, term) {
    document.getElementById('query').value = term;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    searchJobs(1);
  }

  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchJobs(1);
  });

  // Auto search on load
  searchJobs(1);
</script>
</body>
</html>
