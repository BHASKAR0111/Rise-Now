<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restart Mode | Risel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #04050F;
      color: white;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(230, 0, 80, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      transition: background 2s;
    }
    .bg-gradient.success {
      background: radial-gradient(ellipse at center, rgba(0, 194, 255, 0.15) 0%, transparent 60%);
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 800px;
      padding: 40px;
    }

    .question {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1.5px;
      margin-bottom: 40px;
      line-height: 1.2;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      display: none;
    }
    .question.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 18px 32px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .option-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: white;
      transform: scale(1.02);
    }

    .loading-sequence {
      display: none;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transition: opacity 1s;
    }
    .loading-sequence.active {
      display: flex;
      opacity: 1;
    }
    .status-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue, #00C2FF);
      margin-top: 20px;
      margin-bottom: 8px;
    }
    .sub-status {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,194,255,0.2);
      border-top-color: #00C2FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

  </style>
  <link rel="icon" type="image/png" href="images/risel_logo.png">
</head>
<body>

  <div class="bg-gradient" id="bgGrad"></div>

  <div class="container">
    
    <div class="question active" id="q1">
      What feels broken right now?<br>
      <span style="font-size:16px; font-weight:400; color:rgba(255,255,255,0.5);">Be honest.</span>
      <div class="options-grid" style="margin-top:24px;">
        <button class="option-btn" onclick="nextQ(1)">I'm applying to hundreds of jobs, no replies.</button>
        <button class="option-btn" onclick="nextQ(1)">I don't know what career I want anymore.</button>
        <button class="option-btn" onclick="nextQ(1)">I'm totally burnt out and lack motivation.</button>
      </div>
    </div>

    <div class="question" id="q2">
      How much time can you realistically invest<br>every single day?
      <div class="options-grid" style="margin-top:24px;">
        <button class="option-btn" onclick="nextQ(2)">1 Hour (Strictly disciplined)</button>
        <button class="option-btn" onclick="nextQ(2)">3-4 Hours (Part-time hustle)</button>
        <button class="option-btn" onclick="nextQ(2)">8+ Hours (I am desperate and hungry)</button>
      </div>
    </div>

    <div class="question" id="q3">
      Are you willing to trust the process for 30 Days?
      <div class="options-grid" style="margin-top:24px;">
        <button class="option-btn" onclick="nextQ(3)">Yes, I'm ready to restart.</button>
        <button class="option-btn" onclick="nextQ(3)">Show me the plan.</button>
      </div>
    </div>

    <div class="loading-sequence" id="loader">
      <div class="spinner"></div>
      <div class="status-text" id="statusText">Analyzing responses...</div>
      <div class="sub-status" id="subStatus">Purging old habits.</div>
    </div>

  </div>

  <script src="risel_widget.js"></script>
  <script>
    function nextQ(current) {
      const el = document.getElementById('q' + current);
      el.classList.remove('active');
      setTimeout(() => {
        el.style.display = 'none';
        if (current < 3) {
          const nxt = document.getElementById('q' + (current + 1));
          nxt.style.display = 'block';
          setTimeout(() => nxt.classList.add('active'), 50);
        } else {
          finishRestart();
        }
      }, 800);
    }

    function finishRestart() {
      document.getElementById('bgGrad').classList.add('success');
      const loader = document.getElementById('loader');
      loader.style.display = 'flex';
      setTimeout(() => loader.classList.add('active'), 50);

      // Simulation sequence
      setTimeout(() => {
        document.getElementById('statusText').innerText = "Building Comeback Plan...";
        document.getElementById('subStatus').innerText = "Setting daily non-negotiables.";
      }, 1500);

      setTimeout(() => {
        document.getElementById('statusText').innerText = "System Ready.";
        document.getElementById('subStatus').innerText = "Uploading to Dashboard.";
      }, 3000);

      setTimeout(() => {
        if(window.triggerAchievement) {
          window.triggerAchievement('Restart Complete', 'Welcome back. +100 XP', true);
        }
        if(window.addXP) window.addXP(100, 'Initiated Restart Protocol');
        
        // Save the special flag
        localStorage.setItem('riselRestartMode', 'true');

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      }, 4500);
    }
  </script>
</body>
</html>
