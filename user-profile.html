<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Member Profile | Rigel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue: #00C2FF;
      --bg: #0d1117;
      --card: #161b22;
      --border: rgba(255,255,255,0.07);
      --text: rgba(255,255,255,0.85);
      --muted: rgba(255,255,255,0.4);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 64px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    .profile-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      display: flex;
      gap: 30px;
      align-items: center;
      margin-bottom: 40px;
    }

    .avatar-lg {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,194,255,0.2), transparent);
      border: 2px solid var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 20px rgba(0,194,255,0.5);
    }

    .profile-info h1 { font-size: 32px; font-weight: 900; color: white; margin-bottom: 8px;}
    .profile-info .level { font-size: 16px; font-weight: 700; color: var(--blue); margin-bottom: 16px;}

    .btn-connect {
      padding: 10px 24px;
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-connect:hover { opacity: 0.9; transform: translateY(-2px); }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
    }
    .panel h2 { font-size: 20px; font-weight: 800; color: white; margin-bottom: 24px; }

    /* GitHub Grid */
    .heatmap-grid {
      display: grid;
      grid-template-rows: repeat(7, 12px);
      grid-auto-flow: column;
      grid-auto-columns: 12px;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 12px;
    }
    .heatmap-col { display: contents; }
    .heatmap-block {
      width: 12px; height: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      transition: transform 0.2s;
      position: relative;
    }
    .heatmap-block:hover { transform: scale(1.3); z-index: 10; }
    
    .loading-state {
      text-align: center;
      font-size: 16px;
      color: var(--muted);
    }

  </style>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="footer.css"/>
  <link rel="icon" type="image/png" href="images/rigel_logo.png">
</head>

        <span class="default-icon" id="profileIcon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>

        <img id="profileImg" src="" alt="" style="display:none;width:100%;height:100%;border-radius:50%;object-fit:cover;position:absolute;inset:0;"/>

        </div>

    </div>

<style>
/* Tools dropdown styling */
.tools-dropdown { display:none; position:absolute; top:100%; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:8px; min-width:180px; z-index:100; margin-top:16px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
.tools-dropdown.show { display: block !important; }
.tools-dropdown a { display:block; padding:10px 16px; color:var(--text); text-decoration:none; font-size:14px; border-radius:8px; transition:0.2s; text-align:left; }
.tools-dropdown a:hover { background: rgba(0, 194, 255, 0.1); color: var(--blue); }
</style>
<script>
document.addEventListener('click', function(e) {
  const toolsMenu = document.getElementById('toolsDropdown');
  if (toolsMenu && !e.target.closest('.nav-dropdown-wrapper')) {
    toolsMenu.classList.remove('show');
  }
});
</script>
